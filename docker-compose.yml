services:
  db:
    image: postgres:16-alpine
    container_name: minics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: minics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    container_name: minics-backend
    ports:
      - "8080:8080"
    environment:
      # These override application.properties, connecting it to the 'db' container
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/minics
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
    container_name: minics-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: